name: Release
on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      is_new_version: ${{ steps.check.outputs.is_new_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Check if version is bumped
        id: check
        run: |
          VERSION=$(node -p "require('./app/package.json').version")
          TAG="v$VERSION"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. No need to release."
            echo "is_new_version=false" >> $GITHUB_OUTPUT
          else
            echo "New version $TAG detected! Triggering release."
            echo "is_new_version=true" >> $GITHUB_OUTPUT
          fi

  publish:
    permissions:
      contents: write
    needs: check-version
    if: needs.check-version.outputs.is_new_version == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest    # Apple Silicon (ARM64)
          - macos-13        # Intel (x86_64)
          - ubuntu-22.04
          - windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install Node dependencies
        run: bun install
        working-directory: app
        
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action will replace this via package.json
          releaseName: 'HaoMD v__VERSION__'
          releaseBody: 'See the assets below to download.'
          releaseDraft: true
          prerelease: false
          projectPath: app

